name: Feature request
description: Suggest a useful improvement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Clean Link Kit tries to stay small, local, and privacy-friendly.

  - type: textarea
    id: idea
    attributes:
      label: What would you like to add?
      description: Explain the improvement in simple terms.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why is this useful?
      description: Describe who benefits from this change and how.
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Expected size
      options:
        - Small
        - Medium
        - Large
        - Not sure

  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Add examples, links, or related tracking parameters.

