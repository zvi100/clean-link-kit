version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    groups:
      vite:
        patterns:
          - vite
          - "@vitejs/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react*"
      testing:
        patterns:
          - vitest
          - jsdom

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
    open-pull-requests-limit: 5

